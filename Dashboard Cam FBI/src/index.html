<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS - Omniscient Surveillance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- hls.js para streams HLS/m3u8 nativos -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    
    <!-- Leaflet para o Mapa Tático (Fase 13) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        /* Ajustes finos para a barra de rolagem (Estética FBI/Dark) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #10B981; }
        
        /* Efeito de brilho neon no input ativo */
        input:focus { outline: none; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); border-color: #10B981; }

        .glass-card {
            background: #000;
            border: 1px solid #1f2937;
            transition: all 0.2s ease-in-out;
            position: relative;
        }

        .glass-card:hover {
            border-color: #10B981;
            box-shadow: inset 0 0 15px rgba(16, 185, 129, 0.3), 0 0 15px rgba(16, 185, 129, 0.2);
            z-index: 50;
        }

        .glass-card:hover .target-corner {
            opacity: 1;
        }

        .target-corner {
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: #10B981;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 40;
        }

        .tc-tl { top: 0; left: 0; border-top: 2px solid; border-left: 2px solid; }
        .tc-tr { top: 0; right: 0; border-top: 2px solid; border-right: 2px solid; }
        .tc-bl { bottom: 0; left: 0; border-bottom: 2px solid; border-left: 2px solid; }
        .tc-br { bottom: 0; right: 0; border-bottom: 2px solid; border-right: 2px solid; }

        .fullscreen-info {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 40%);
        }

        /* --- MOTION TRAIL (Pesquisa v25.0) --- */
        .trail-canvas {
            position: absolute;
            inset: 0;
            z-index: 25;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.85;
        }

        /* FBI Alert overlay */
        .fbi-alert {
            animation: fbi-pulse 1s ease-in-out infinite;
            border: 2px solid #ef4444;
        }

        @keyframes fbi-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
            50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
        }

        .animate-scan {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #10B981, transparent);
            position: absolute;
            top: 0;
            opacity: 0.1;
            animation: scan 3s linear infinite;
            pointer-events: none;
            z-index: 30;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .aspect-video {
            aspect-ratio: 16 / 9;
        }

        /* Animação personalizada para o grid */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        #tacticalMap {
            width: 100%;
            height: 100%;
            background: #0b0e14;
        }

        /* Estilo Dark para o Leaflet */
        .leaflet-container { background: #0b111a; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #1f2937;
            color: #10B981;
            border: 1px solid #374151;
            font-family: monospace;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 h-screen flex flex-col font-mono overflow-hidden cursor-default select-none">

    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-lg flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            <h1 class="text-xl font-bold tracking-widest text-emerald-500">OSS <span class="text-xs text-gray-400 ml-2">Omniscient Surveillance System v0.1</span></h1>
        </div>
        
        <div class="relative w-1/3">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchInput" class="bg-gray-900 border border-gray-600 text-gray-100 text-sm rounded-md block w-full pl-10 p-2.5 transition-all duration-300" placeholder="Pesquisar câmera pelo nome único...">
        </div>

        <button onclick="openAddModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded transition-colors duration-200 flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            ADICIONAR CÂMERA
        </button>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col">
        <!-- Barra de Setores / Filtros (Dinamizada para Hierarquia) -->
        <div id="filterBar" class="bg-gray-900 border-b border-gray-800 p-2 overflow-x-auto whitespace-nowrap flex space-x-2 items-center">
            <!-- Gerado via JavaScript -->
        </div>

        <div id="cameraGrid" class="flex-1 overflow-y-auto p-1 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-1 bg-black">
        </div>

        <div id="mapContainer" class="flex-1 hidden">
            <div id="tacticalMap"></div>
        </div>
    </main>

    <div id="fullscreenModal" class="fixed inset-0 bg-black z-50 hidden flex-col">
        <!-- Header OSS -->
        <div class="flex justify-between items-center px-4 py-2 bg-gray-900/90 border-b border-emerald-900/30">
            <div class="flex items-center space-x-3">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                <h2 id="modalTitle" class="text-sm font-bold text-emerald-400 tracking-widest font-mono uppercase"></h2>
                <span class="text-[10px] text-gray-500 font-mono" id="modalMeta">--</span>
                <span id="modalCounter" class="text-[9px] text-gray-600 font-mono"></span>
            </div>
            <div class="flex items-center space-x-3">
                <button id="toggleTrail" onclick="toggleMotionTrail()" class="text-[10px] font-mono text-gray-500 hover:text-emerald-400 border border-gray-700 hover:border-emerald-500 px-2 py-1 rounded transition-all">
                    TRAIL: ON
                </button>
                <button onclick="checkFBIWanted()" class="text-[10px] font-mono text-gray-500 hover:text-red-400 border border-gray-700 hover:border-red-500 px-2 py-1 rounded transition-all">
                    ⚠ FBI CHECK
                </button>
                <button onclick="closeFullscreen()" class="bg-red-900/80 hover:bg-red-700 text-white font-bold py-1 px-4 rounded text-xs transition-colors font-mono tracking-widest">
                    ESC / FECHAR
                </button>
            </div>
        </div>

        <!-- Video + Canvas + Nav Arrows -->
        <div id="modalContent" class="flex-1 bg-black relative overflow-hidden">
            <!-- Canvas layer para Motion Trail -->
            <canvas id="trailCanvas" class="trail-canvas"></canvas>

            <!-- Seta Anterior -->
            <button onclick="navigateCamera(-1)" id="navPrev"
                class="absolute left-0 top-0 h-full w-20 z-30 flex items-center justify-start pl-3
                       bg-gradient-to-r from-black/60 to-transparent
                       text-white/40 hover:text-white transition-all duration-200 group">
                <svg class="w-10 h-10 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>

            <!-- Seta Próxima -->
            <button onclick="navigateCamera(1)" id="navNext"
                class="absolute right-0 top-0 h-full w-20 z-30 flex items-center justify-end pr-3
                       bg-gradient-to-l from-black/60 to-transparent
                       text-white/40 hover:text-white transition-all duration-200 group">
                <svg class="w-10 h-10 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <!-- FBI Wanted Panel (colapsável) -->
        <div id="fbiPanel" class="hidden bg-gray-950 border-t border-red-900/40 p-3">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-mono text-red-400 font-bold tracking-widest">⚠ FBI MOST WANTED — CROSS-REFERENCE ACTIVE</span>
                <button onclick="document.getElementById('fbiPanel').classList.add('hidden')" class="text-gray-600 hover:text-gray-400 text-xs">FECHAR</button>
            </div>
            <div id="fbiGrid" class="flex space-x-3 overflow-x-auto pb-2"></div>
        </div>
    </div>

    <!-- Modal Adicionar Câmera -->
    <div id="addCameraModal" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold text-emerald-500 mb-6 tracking-widest uppercase font-mono italic">Nova Unidade de Vigilância</h2>
            
            <div class="space-y-4 font-mono">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Identificação / Nome</label>
                    <input type="text" id="newCamName" class="bg-gray-900 border border-gray-600 text-white text-sm rounded-md block w-full p-2.5 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all" placeholder="Ex: ENTRADA SUL - PORTÃO B">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Link do YouTube (Watch URL)</label>
                    <input type="text" id="newCamUrl" class="bg-gray-900 border border-gray-600 text-white text-sm rounded-md block w-full p-2.5 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all" placeholder="https://www.youtube.com/watch?v=...">
                </div>
            </div>

            <div class="flex space-x-3 mt-8">
                <button onclick="closeAddModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded transition-colors text-sm uppercase tracking-wider font-mono">
                    Cancelar
                </button>
                <button onclick="addNewCamera()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition-colors text-sm uppercase tracking-wider font-mono">
                    Ativar Unidade
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Editar Câmera -->
    <div id="editCameraModal" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-md shadow-2xl relative">
            <h2 class="text-xl font-bold text-yellow-500 mb-6 tracking-widest uppercase font-mono italic">Configuração de Unidade</h2>
            
            <input type="hidden" id="editCamId">

            <div class="space-y-4 font-mono">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Identificação / Nome</label>
                    <input type="text" id="editCamName" class="bg-gray-900 border border-gray-600 text-white text-sm rounded-md block w-full p-2.5 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Link do YouTube (Watch URL)</label>
                    <input type="text" id="editCamUrl" class="bg-gray-900 border border-gray-600 text-white text-sm rounded-md block w-full p-2.5 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all">
                </div>
            </div>

            <div class="flex flex-col space-y-3 mt-8">
                <div class="flex space-x-3">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded transition-colors text-sm uppercase tracking-wider font-mono">
                        Voltar
                    </button>
                    <button onclick="saveEditCamera()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition-colors text-sm uppercase tracking-wider font-mono">
                        Salvar Alterações
                    </button>
                </div>
                <button onclick="deleteCamera()" class="w-full bg-red-900 hover:bg-red-800 text-red-100 font-bold py-2 rounded transition-colors text-xs uppercase tracking-widest font-mono border border-red-700">
                    DESATIVAR UNIDADE (REMOVER)
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Importação Bulk -->
    <div id="bulkImportModal" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden flex items-center justify-center p-4 font-mono">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-2xl shadow-2xl">
            <h2 class="text-xl font-bold text-blue-500 mb-2 tracking-widest uppercase italic">Importação em Massa (Bulk)</h2>
            <p class="text-xs text-gray-400 mb-4 uppercase tracking-tighter">Formato: NOME | URL | LOCAL | SETOR (Cuidado ao processar grandes volumes)</p>
            
            <textarea id="bulkData" class="bg-gray-900 border border-gray-600 text-white text-sm rounded-md block w-full p-4 h-64 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono mb-6" placeholder="MIAMI BEACH | https://youtube.com/watch?v=R0AiaL-i_F0 | Miami Beach, FL | FL&#10;TAMPA BAY | https://youtube.com/watch?v=3VzE4uI7p6w | Tampa, FL | FL"></textarea>

            <div class="flex space-x-3">
                <button onclick="closeBulkModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded transition-colors text-sm uppercase tracking-wider">
                    Cancelar
                </button>
                <button onclick="processBulkImport()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition-colors text-sm uppercase tracking-wider">
                    Ativar Unidades
                </button>
            </div>
        </div>
    </div>

    <script>
        const bulkImportModal = document.getElementById('bulkImportModal');
        const cameraGridDiv = document.getElementById('cameraGrid');
        const mapContainerDiv = document.getElementById('mapContainer');

        let currentSector = 'ALL';
        let tauriMap = null;
        let mapMarkers = [];
        let mapHeat = null;
        let isMapView = false;

        // === SISTEMA DE VERSIONAMENTO DO DATASET ===
        const OSS_DATASET_VERSION = '18.0'; // Automação & Persistência Local

        let activeCameras = []; // Agora carregado via Rust
        // Árvore de Localizações para o "IA-Flow"
        const LOCATIONS_TREE = {
            "BR": {
                name: "Brasil",
                states: {
                    "SC": { name: "Santa Catarina", cities: ["Florianópolis"] },
                    "RJ": { name: "Rio de Janeiro", cities: ["Rio de Janeiro"] }
                }
            },
            "US": {
                name: "EUA",
                states: {
                    "NY": { name: "New York", cities: ["New York"] },
                    "FL": { name: "Florida", cities: ["Miami", "Key West"] },
                    "NV": { name: "Nevada", cities: ["Las Vegas"] },
                    "TN": { name: "Tennessee", cities: ["Nashville"] },
                    "LA": { name: "Louisiana", cities: ["New Orleans"] },
                    "WA": { name: "Washington", cities: ["Seattle"] },
                    "DC": { name: "Dist. Columbia", cities: ["Washington"] }
                }
            },
            "JP": { name: "Japão", states: { "TYO": { name: "Tokyo", cities: ["Shibuya"] } } },
            "UK": { name: "UK", states: { "LDN": { name: "London", cities: ["London"] } } },
            "IT": { name: "Itália", states: { "VNC": { name: "Venice", cities: ["Venice"] } } },
            "FR": { name: "França", states: { "PRS": { name: "Paris", cities: ["Paris"] } } }
        };

        let currentSelection = { pais: null, estado: null, cidade: null };

        function updateFilterBar() {
            const bar = document.getElementById('filterBar');
            bar.innerHTML = '';

            // Botão Global
            bar.appendChild(createFilterBtn('GLOBAL', () => {
                currentSelection = { pais: null, estado: null, cidade: null };
                updateUI();
            }, !currentSelection.pais));

            if (!currentSelection.pais) {
                // Listar Países
                Object.keys(LOCATIONS_TREE).forEach(pCode => {
                    bar.appendChild(createFilterBtn(LOCATIONS_TREE[pCode].name, () => {
                        currentSelection.pais = pCode;
                        updateUI();
                    }));
                });
            } else if (!currentSelection.estado) {
                // Listar Estados do País selecionado
                bar.appendChild(createSeparator());
                Object.keys(LOCATIONS_TREE[currentSelection.pais].states).forEach(sCode => {
                    bar.appendChild(createFilterBtn(LOCATIONS_TREE[currentSelection.pais].states[sCode].name, () => {
                        currentSelection.estado = sCode;
                        updateUI();
                    }));
                });
            } else if (!currentSelection.cidade) {
                // Listar Cidades do Estado selecionado
                bar.appendChild(createSeparator());
                LOCATIONS_TREE[currentSelection.pais].states[currentSelection.estado].cities.forEach(city => {
                    bar.appendChild(createFilterBtn(city, () => {
                        currentSelection.cidade = city;
                        updateUI();
                    }));
                });
            } else {
                // Final da hierarquia - botão de voltar para estado
                bar.appendChild(createSeparator());
                bar.appendChild(createFilterBtn(`[${currentSelection.cidade}] - RESET`, () => {
                    currentSelection.cidade = null;
                    updateUI();
                }, true));
            }

            // Botão Bulk sempre visível no final
            const spacer = document.createElement('div');
            spacer.className = 'flex-1';
            bar.appendChild(spacer);
            
            const bulkBtn = document.createElement('button');
            bulkBtn.onclick = openBulkModal;
            bulkBtn.className = "bg-blue-900 hover:bg-blue-800 text-blue-100 px-4 py-1 rounded text-xs font-bold uppercase tracking-widest border border-blue-700 transition-all font-mono mr-2";
            bulkBtn.innerText = 'IMPORTAÇÃO BULK';
            bar.appendChild(bulkBtn);

            const mapBtn = document.createElement('button');
            mapBtn.onclick = toggleView;
            mapBtn.className = `px-4 py-1 rounded text-xs font-bold uppercase tracking-widest border transition-all font-mono ${isMapView ? 'bg-red-950 text-red-400 border-red-800' : 'bg-emerald-950 text-emerald-400 border-emerald-800 hover:bg-emerald-800'}`;
            mapBtn.innerText = isMapView ? 'VOLTAR AO GRID' : '🗺️ MAPA TÁTICO';
            bar.appendChild(mapBtn);
        }

        function toggleView() {
            isMapView = !isMapView;
            if (isMapView) {
                cameraGridDiv.classList.add('hidden');
                mapContainerDiv.classList.remove('hidden');
                initTauriMap();
            } else {
                cameraGridDiv.classList.remove('hidden');
                mapContainerDiv.classList.add('hidden');
            }
            updateUI();
        }

        function initTauriMap() {
            if (tauriMap) return;
            
            // Inicializa mapa (Center: Brasil)
            tauriMap = L.map('tacticalMap', { zoomControl: false }).setView([-15.78, -47.92], 4);
            
            // Tile Layer Dark (CartoDB)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; Olho de Deus Intelligence'
            }).addTo(tauriMap);

            L.control.zoom({ position: 'bottomright' }).addTo(tauriMap);

            updateMapMarkers();
            
            // Inicia Polling de Avistamentos (Fase 13)
            setInterval(updateSightings, 5000);
            updateSightings();
        }

        let sightingMarkers = [];

        async function updateSightings() {
            if (!tauriMap || !isMapView) return;

            try {
                const { invoke } = window.__TAURI__.core;
                const sightings = await invoke('get_recent_sightings');
                
                // Limpa sightings antigos
                sightingMarkers.forEach(m => tauriMap.removeLayer(m));
                sightingMarkers = [];

                const sightingsHeatData = [];
                sightings.forEach(s => {
                    // Busca a câmera correspondente para pegar lat/long
                    const cam = activeCameras.find(c => c.id == s.camera_id || c.nome == s.camera_id);
                    if (cam && cam.lat && cam.long) {
                        const isHighRisk = s.threat_score >= 8.0;
                        const color = isHighRisk ? '#ff0000' : '#ff9900';
                        
                        const marker = L.circleMarker([cam.lat, cam.long], {
                            radius: isHighRisk ? 10 : 7,
                            fillColor: color,
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9,
                            className: isHighRisk ? 'fbi-alert' : ''
                        }).addTo(tauriMap);

                        marker.bindPopup(`
                            <div style="font-family: monospace; font-size: 10px;">
                                <b style="color: ${color}">🚨 AVISTAMENTO: ${s.name}</b><br>
                                SCORE: ${s.threat_score.toFixed(1)}/10.0<br>
                                DATA: ${s.captured_at}<br>
                                LOCAL: ${cam.nome}<br>
                                <hr style="margin: 5px 0; border: 0.5px solid #333;">
                                <button onclick="openFullscreen('${cam.id}')" style="background: #ef4444; color: white; border: none; padding: 2px 5px; cursor: pointer; width: 100%; font-weight: bold;">INTERCEPTAR FEED</button>
                            </div>
                        `);
                        sightingMarkers.push(marker);
                        
                        // Alimenta dados do heatmap: [lat, long, intensidade]
                        // Alvos de alto risco geram mais "calor"
                        sightingsHeatData.push([cam.lat, cam.long, isHighRisk ? 1.0 : 0.6]);
                    }
                });

                // Atualiza Heatmap Tático
                if (mapHeat) tauriMap.removeLayer(mapHeat);
                mapHeat = L.heatLayer(sightingsHeatData, {radius: 35, blur: 20, maxZoom: 17}).addTo(tauriMap);

                // --- TRAJETÓRIAS (Fase 13: Deduplicação Global) ---
                drawTrajectories(sightings);

            } catch (err) {
                console.error("[MAP] Erro ao buscar avistamentos:", err);
            }
        }

        let mapPolylines = [];
        function drawTrajectories(sightings) {
            // Limpa trajetórias anteriores
            mapPolylines.forEach(p => tauriMap.removeLayer(p));
            mapPolylines = [];

            // Agrupa avistamentos por alvo (UID) ordenados por tempo
            const groups = {};
            sightings.forEach(s => {
                if (!groups[s.individual_id]) groups[s.individual_id] = [];
                groups[s.individual_id].push(s);
            });

            Object.keys(groups).forEach(uid => {
                const targetSightings = groups[uid].sort((a,b) => new Date(a.captured_at) - new Date(b.captured_at));
                
                const pathCoords = targetSightings.map(s => {
                    const cam = activeCameras.find(c => c.id == s.camera_id || c.nome == s.camera_id);
                    return cam && cam.lat && cam.long ? [cam.lat, cam.long] : null;
                }).filter(c => c !== null);

                if (pathCoords.length > 1) {
                    const polyline = L.polyline(pathCoords, {
                        color: stringToColor(uid),
                        weight: 3,
                        opacity: 0.6,
                        dashArray: '5, 10'
                    }).addTo(tauriMap);
                    mapPolylines.push(polyline);
                }
            });
        }

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            let color = '#';
            for (let i = 0; i < 3; i++) {
                let value = (hash >> (i * 8)) & 0xFF;
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        }

        function updateMapMarkers() {
            if (!tauriMap) return;

            // Limpa markers anteriores
            mapMarkers.forEach(m => tauriMap.removeLayer(m));
            mapMarkers = [];
            
            const heatData = [];
            const filtered = filterCurrentSet(activeCameras);

            filtered.forEach(cam => {
                if (cam.lat && cam.long) {
                    const color = cam.status === 'OFFLINE' ? '#ef4444' : '#10B981';
                    const marker = L.circleMarker([cam.lat, cam.long], {
                        radius: 6,
                        fillColor: color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(tauriMap);

                    marker.bindPopup(`
                        <div style="font-size: 10px;">
                            <b style="color: ${color}">${cam.nome}</b><br>
                            ${cam.local}<br>
                            <button onclick="openFullscreen(${cam.id})" style="margin-top: 5px; background: #10B981; color: white; border: none; padding: 2px 5px; cursor: pointer; width: 100%;">LIVE FEED</button>
                        </div>
                    `);
                    mapMarkers.push(marker);
                    
                    // Dados para o heatmap (simulado usando status)
                    if (cam.status !== 'OFFLINE') {
                        heatData.push([cam.lat, cam.long, 0.5]);
                    }
                }
            });

            if (mapHeat) tauriMap.removeLayer(mapHeat);
            mapHeat = L.heatLayer(heatData, {radius: 25, blur: 15, maxZoom: 17}).addTo(tauriMap);
            
            // Auto-ajuste de bounds se houver markers
            if (mapMarkers.length > 0) {
                const group = new L.featureGroup(mapMarkers);
                tauriMap.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // ========================================================
        //  MOTION TRAIL ENGINE (Pesquisa v25.0)
        //  Background Subtraction via Canvas API - 100% no browser
        // ========================================================
        let trailEnabled = true;
        let trailRAF = null;
        let prevPixels = null;
        let currentHlsInstance = null;

        function toggleMotionTrail() {
            trailEnabled = !trailEnabled;
            document.getElementById('toggleTrail').innerText = `TRAIL: ${trailEnabled ? 'ON' : 'OFF'}`;
            const canvas = document.getElementById('trailCanvas');
            if (canvas) canvas.style.opacity = trailEnabled ? '0.85' : '0';
        }

        function startMotionTrail(videoEl) {
            if (trailRAF) cancelAnimationFrame(trailRAF);
            prevPixels = null;

            const canvas = document.getElementById('trailCanvas');
            if (!canvas || !videoEl) return;

            const ctx = canvas.getContext('2d');
            const THRESHOLD = 20; // Sensibilidade: pixels com delta > 20 = movimento

            function loop() {
                if (videoEl.readyState < 2) {
                    trailRAF = requestAnimationFrame(loop);
                    return;
                }

                // Sincroniza tamanho do canvas com o vídeo
                if (canvas.width !== videoEl.videoWidth || canvas.height !== videoEl.videoHeight) {
                    canvas.width = videoEl.videoWidth || canvas.offsetWidth;
                    canvas.height = videoEl.videoHeight || canvas.offsetHeight;
                }

                if (!trailEnabled) {
                    trailRAF = requestAnimationFrame(loop);
                    return;
                }

                // Desenha frame atual num canvas oculto para extração de pixels
                const offscreen = new OffscreenCanvas(canvas.width, canvas.height);
                const offCtx = offscreen.getContext('2d');
                offCtx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                const frame = offCtx.getImageData(0, 0, canvas.width, canvas.height);
                const currentPixels = frame.data;

                if (prevPixels && prevPixels.length === currentPixels.length) {
                    // Efeito de "ghosting": escurece o canvas anterior levemente
                    // (Em vez de clearRect, usamos fillRect com baixa opacidade)
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Cria imageData para pintar apenas os pixels com movimento
                    const output = ctx.createImageData(canvas.width, canvas.height);
                    const out = output.data;

                    for (let i = 0; i < currentPixels.length; i += 4) {
                        const dr = Math.abs(currentPixels[i]     - prevPixels[i]);
                        const dg = Math.abs(currentPixels[i + 1] - prevPixels[i + 1]);
                        const db = Math.abs(currentPixels[i + 2] - prevPixels[i + 2]);
                        const delta = (dr + dg + db) / 3;

                        if (delta > THRESHOLD) {
                            // Pinta o pixel em movimento com a cor original (efeito neon)
                            out[i]     = Math.min(255, currentPixels[i] + 80);   // R
                            out[i + 1] = Math.min(255, currentPixels[i + 1] + 150); // G (verde neon)
                            out[i + 2] = currentPixels[i + 2];                  // B
                            out[i + 3] = Math.min(255, delta * 3);               // Alpha baseado no delta
                        }
                    }
                    ctx.putImageData(output, 0, 0);
                }

                prevPixels = new Uint8ClampedArray(currentPixels);
                trailRAF = requestAnimationFrame(loop);
            }

            trailRAF = requestAnimationFrame(loop);
        }

        function stopMotionTrail() {
            if (trailRAF) {
                cancelAnimationFrame(trailRAF);
                trailRAF = null;
            }
            prevPixels = null;
            const canvas = document.getElementById('trailCanvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

                const res = await fetch('https://api.fbi.gov/wanted/v1/list?page=1&sort_on=modified&sort_order=desc&limit=10');

                if (suspects.length === 0) {

                    const name = (s.title || s.subjects?.[0] || 'UNKNOWN').substring(0, 25);

                            <div class="p-1">
                                <div class="text-[8px] font-bold text-red-400 font-mono uppercase truncate">${name}</div>
                                <div class="text-[7px] text-gray-500 font-mono truncate mt-0.5">${crime || 'CLASSIFIED'}</div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                grid.innerHTML = `<span class="text-[10px] text-red-500 font-mono">CONNECTION FAILED: ${err.message}</span>`;
            }
        }

        // ========================================================
        //  NAVEGAÇÃO CARROSSEL FULLSCREEN (v25.1)
        //  Prev/Next com setas, teclado ← → e swipe touch
        // ========================================================
        let currentCamIndex = 0;       // índice na lista filtrada atual
        let currentCamList = [];        // cópia da lista filtrada ativa

        function openFullscreen(id) {
            // Calcula o índice na lista filtrada atual
            const filtered = filterCurrentSet(activeCameras);
            const idx = filtered.findIndex(c => c.id === id);
            currentCamList = filtered;
            openFullscreenAt(idx >= 0 ? idx : 0);
        }

        function openFullscreenAt(index) {
            currentCamIndex = (index + currentCamList.length) % currentCamList.length;
            const cam = currentCamList[currentCamIndex];
            if (!cam) return;

            // Atualiza header
            modalTitle.innerText = cam.nome;
            document.getElementById('modalMeta').innerText = `${cam.local || ''} | ${cam.pais || ''}-${cam.estado || ''}`;
            document.getElementById('modalCounter').innerText = `[ ${currentCamIndex + 1} / ${currentCamList.length} ]`;

            const content = document.getElementById('modalContent');

            // Remove elementos de vídeo anteriores (mantém canvas + botões de nav)
            content.querySelectorAll('video, iframe, div').forEach(el => {
                if (!el.id && el.tagName !== 'BUTTON') el.remove();
            });

            // Destroy HLS anterior para liberar RAM
            if (currentHlsInstance) {
                currentHlsInstance.destroy();
                currentHlsInstance = null;
            }
            stopMotionTrail();

            // Insere o player correto
            const playerDiv = document.createElement('div');
            playerDiv.className = 'absolute inset-0';
            // Insere antes das setas para não sobrepor
            const navPrev = document.getElementById('navPrev');
            content.insertBefore(playerDiv, navPrev);
            playerDiv.innerHTML = getPlayerHtml(cam, true);

            // Inicia Motion Trail se for vídeo HLS
            if (cam.tipo === 'hls' || cam.url?.endsWith('.m3u8')) {
                setTimeout(() => {
                    const videoEl = content.querySelector('video');
                    if (videoEl) startMotionTrail(videoEl);
                }, 500);
            }

            // Esconde painel FBI
            document.getElementById('fbiPanel').classList.add('hidden');

            fullscreenModal.classList.remove('hidden');
            fullscreenModal.classList.add('flex');
            document.body.classList.add('overflow-hidden');
        }

        function navigateCamera(direction) {
            // Atualiza a lista filtrada (caso tenha mudado)
            if (currentCamList.length === 0) return;
            openFullscreenAt(currentCamIndex + direction);
        }

        function closeFullscreen() {
            // Destroy HLS (pesquisa: prevent memory leak)
            if (currentHlsInstance) {
                currentHlsInstance.destroy();
                currentHlsInstance = null;
            }
            stopMotionTrail();

            fullscreenModal.classList.add('hidden');
            fullscreenModal.classList.remove('flex');
            const content = document.getElementById('modalContent');
            // Remove apenas iframes e vídeos, mantém o canvas
            content.querySelectorAll('video, iframe, div:not(#trailCanvas)').forEach(el => el.remove());
            document.body.classList.remove('overflow-hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (!fullscreenModal.classList.contains('hidden')) {
                if (e.key === 'Escape') closeFullscreen();
                if (e.key === 'ArrowRight') navigateCamera(1);
                if (e.key === 'ArrowLeft')  navigateCamera(-1);
            }
        });

        // Swipe Touch (mobile/trackpad)
        let touchStartX = 0;
        document.getElementById('fullscreenModal').addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].clientX;
        }, { passive: true });
        document.getElementById('fullscreenModal').addEventListener('touchend', (e) => {
            const dx = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(dx) > 50) navigateCamera(dx > 0 ? 1 : -1);
        }, { passive: true });

        // Detecta o tipo de URL e retorna o HTML do player correto
        function getPlayerHtml(cam, isFullscreen = false) {
            const url = cam.url;
            const tipo = cam.tipo || (url.includes('youtube.com/watch') ? 'youtube' : url.endsWith('.m3u8') ? 'hls' : url.includes('fl511.com') ? 'iframe' : 'jpeg');

            if (tipo === 'youtube' || url.includes('youtube.com/watch')) {
                let videoId = url.split('v=')[1];
                const amp = videoId.indexOf('&');
                if (amp !== -1) videoId = videoId.substring(0, amp);
                
                if (isFullscreen) {
                    return `<div class="relative w-full h-full overflow-hidden">
                        <iframe class="absolute top-[-10%] left-[-2%] w-[104%] h-[120%]" 
                            src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&vq=hd2160&rel=0" 
                            frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
                        </iframe>
                        <div class="absolute inset-0 z-20"></div>
                    </div>`;
                } else {
                    // THUMBNAIL FIRST: Apenas imagem se não estiver em tela cheia
                    const thumbUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                    return `<div class="relative w-full h-full overflow-hidden">
                        <img src="${thumbUrl}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/30 group-hover:bg-black/10 transition-all duration-300">
                            <div class="w-12 h-12 rounded-full bg-emerald-500/80 flex items-center justify-center text-white scale-0 group-hover:scale-100 transition-transform duration-300 shadow-lg shadow-emerald-500/50">
                                <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M4.5 3.5v13L16 10 4.5 3.5z"/>
                                </svg>
                            </div>
                        </div>
                    </div>`;
                }
            } else if (tipo === 'hls' || url.endsWith('.m3u8')) {
                if (isFullscreen) {
                    const videoId = `hls-${cam.id}-${Date.now()}`;
                    setTimeout(() => {
                        const video = document.getElementById(videoId);
                        if (!video) return;

                        // Tenta hls.js primeiro; fallback para src nativo (WebKit/Tauri suporta HLS)
                        if (Hls.isSupported()) {
                            const hls = new Hls({ autoStartLoad: true, enableWorker: true, debug: false });
                            hls.loadSource(url);
                            hls.attachMedia(video);
                            currentHlsInstance = hls;
                            // Handler de erro: mostra feedback visual
                            hls.on(Hls.Events.ERROR, (event, data) => {
                                if (data.fatal) {
                                    const overlay = document.getElementById('hlsErrorOverlay');
                                    if (overlay) overlay.classList.remove('hidden');
                                }
                            });
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            // Safari/WebKit nativo (Tauri no Linux com WebKitGTK)
                            video.src = url;
                            video.play().catch(() => {});
                        } else {
                            const overlay = document.getElementById('hlsErrorOverlay');
                            if (overlay) overlay.classList.remove('hidden');
                        }
                    }, 150);
                    return `
                        <video id="${videoId}" class="w-full h-full object-cover" autoplay muted playsinline crossorigin="anonymous"></video>
                        <div id="hlsErrorOverlay" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-10">
                            <svg class="w-12 h-12 text-rose-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                            </svg>
                            <span class="text-rose-400 font-mono text-xs tracking-widest">STREAM OFFLINE</span>
                            <span class="text-gray-600 font-mono text-[10px] mt-1 max-w-xs text-center truncate">${url}</span>
                            <button onclick="location.reload()" class="mt-4 text-[10px] font-mono text-gray-500 border border-gray-700 px-3 py-1 rounded hover:text-emerald-400 hover:border-emerald-600 transition-all">TENTAR NOVAMENTE</button>
                        </div>`;
                } else {
                    // Grid: placeholder visual com ícone de câmera
                    return `<div class="w-full h-full bg-gray-950 flex flex-col items-center justify-center space-y-1">
                        <svg class="w-6 h-6 text-emerald-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                        </svg>
                        <span class="text-[8px] text-emerald-900/60 font-mono tracking-widest uppercase">HLS</span>
                    </div>`;
                }
            } else if (tipo === 'mjpeg') {
                // MJPEG: exibe direto como img (atualiza automaticamente)
                return `<img src="${url}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'w-full h-full bg-gray-950 flex items-center justify-center text-rose-900 text-[8px] font-mono\'>OFFLINE</div>'">`;
            } else {
                // JPEG estático: exibe como img com refresh automático
                if (isFullscreen) {
                    return `<img src="${url}" id="staticImg-${cam.id}" class="w-full h-full object-cover"
                        onerror="this.parentElement.innerHTML='<div class=\'w-full h-full bg-gray-950 flex items-center justify-center text-rose-500 text-xs font-mono\'>STREAM OFFLINE</div>'">`;
                } else {
                    return `<img src="${url}" class="w-full h-full object-cover"
                        onerror="this.style.opacity='0.1'">`;
                }
            }
        }

        // Função para renderizar os blocos na tela
        function renderizarCameras(cameras) {
            cameraGrid.innerHTML = '';
            
            if(cameras.length === 0) {
                cameraGrid.innerHTML = '<p class="text-gray-500 col-span-full text-center mt-10">Nenhuma câmera encontrada.</p>';
                return;
            }

            cameras.forEach((cam, index) => {
                const statusColor = cam.status === 'OFFLINE' ? 'text-rose-500' : 'text-emerald-400';
                const dotColor = cam.status === 'OFFLINE' ? 'bg-rose-500' : 'bg-emerald-500';
                
                const videoPlayerHtml = getPlayerHtml(cam);
                const timestamp = new Date().toLocaleTimeString('pt-BR', { hour12: false });

                const camBlock = `
                    <div onclick="openFullscreen(${cam.id})" 
                         class="glass-card group cursor-pointer animate-fade-in aspect-video overflow-hidden"
                         style="animation-delay: ${index * 0.02}s">
                        
                        <!-- Target Corners (Target Lock Effect) -->
                        <div class="target-corner tc-tl"></div>
                        <div class="target-corner tc-tr"></div>
                        <div class="target-corner tc-bl"></div>
                        <div class="target-corner tc-br"></div>
                        
                        <!-- Video Feed -->
                        <div class="w-full h-full bg-black relative">
                            ${videoPlayerHtml}
                            <div class="animate-scan"></div>
                        </div>

                        <!-- OSD Layer (On-Screen Display) -->
                        <div class="absolute inset-0 osd-overlay p-2 flex flex-col justify-between z-20 pointer-events-none">
                            <!-- Top OSD -->
                            <div class="flex justify-between items-start">
                                <div class="flex items-center space-x-2 bg-black/40 px-1.5 py-0.5 rounded backdrop-blur-sm">
                                    <span class="w-1.5 h-1.5 rounded-full ${dotColor} ${cam.status !== 'OFFLINE' ? 'animate-pulse' : ''}"></span>
                                    <span class="text-[9px] font-bold text-white tracking-widest uppercase truncate max-w-[120px]">
                                        ${cam.status === 'OFFLINE' ? 'LOST' : 'REC'} | ${cam.nome}
                                    </span>
                                </div>
                                <div class="text-[8px] font-mono text-gray-400 bg-black/40 px-1 rounded">
                                    CAM-ID: ${cam.id} | ${timestamp}
                                </div>
                            </div>

                            <!-- Bottom OSD -->
                            <div class="flex justify-between items-end">
                                <div class="flex flex-col">
                                    <span class="text-[8px] text-emerald-500 font-bold tracking-tighter opacity-70">
                                        LNG: ${cam.pais || 'XX'} / LAT: ${cam.estado || 'XX'}
                                    </span>
                                    <span class="text-[9px] text-white/60 font-mono uppercase tracking-widest">
                                        ${cam.local || 'LOC_UNKNOWN'}
                                    </span>
                                </div>
                                <div class="flex space-x-1 pointer-events-auto">
                                    <button onclick="event.stopPropagation(); refreshCamera(${cam.id})" class="p-1 hover:bg-emerald-500/20 rounded border border-white/5 text-white/40 hover:text-emerald-400 transition-all">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                    </button>
                                    <button onclick="event.stopPropagation(); openEditModal(${cam.id})" class="p-1 hover:bg-yellow-500/20 rounded border border-white/5 text-white/40 hover:text-yellow-500 transition-all">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                cameraGrid.innerHTML += camBlock;
            });
        }

        // Filtro em Tempo Real
        searchInput.addEventListener('input', (e) => {
            const termoPesquisa = e.target.value.toLowerCase();
            const camerasFiltradas = activeCameras.filter(cam => 
                cam.nome.toLowerCase().includes(termoPesquisa)
            );
            renderizarCameras(camerasFiltradas);
        });

        // Função de Refresh Individual (AGORA COM AUTO-HEALING REAL)
        async function refreshCamera(id) {
            const cam = activeCameras.find(c => c.id === id);
            if (!cam) return;

            console.log(`[HEALTH] Iniciando auto-ajuste para: ${cam.nome}...`);
            
            // Visual feedback: Troca ícone por loading (opcional, mas proativo)
            const btn = event?.currentTarget;
            if (btn) btn.classList.add('animate-spin', 'text-blue-400');

            try {
                const { invoke } = window.__TAURI__.core;
                
                // Busca o ID mais recente no YouTube usando o nome da câmera
                // Limpeza agressiva para melhorar a busca: remove traços e espaços extras
                const searchTerm = cam.nome.replace(/[—\-]/g, ' ').replace(/\s+/g, ' ').trim();
                const newId = await invoke('get_live_id', { searchTerm: searchTerm });
                
                if (newId) {
                    const newUrl = `https://www.youtube.com/watch?v={key}`.replace('{key}', newId);
                    if (cam.url !== newUrl) {
                        console.log(`[HEALTH] Novo ID detectado: ${newId}. Atualizando...`);
                        cam.url = newUrl;
                        saveCameras(); // Persiste no localStorage
                        updateUI();
                    } else {
                        console.log(`[HEALTH] O ID atual já é o mais recente.`);
                        updateUI(); // Apenas re-renderiza
                    }
                }
            } catch (err) {
                console.error(`[HEALTH] Falha no auto-ajuste: ${err}`);
                // Se falhar o Rust (ex: yt-dlp não instalado), apenas re-renderiza
                updateUI();
            } finally {
                if (btn) btn.classList.remove('animate-spin', 'text-blue-400');
            }
        }

        // Renderiza tudo ao iniciar a página
        loadCameras();
    </script>
</body>
</html>
