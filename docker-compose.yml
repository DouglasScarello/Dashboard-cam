version: '3.8'

services:
  # Banco de Dados Profissional para Inteligência com Suporte Vetorial
  db:
    image: ankane/pgvector:v0.5.1
    container_name: intelligence_db_pg
    environment:
      POSTGRES_DB: intelligence
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: protocol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Motor de Inteligência e Ingestão (Olho de Deus)
  intelligence:
    build: .
    container_name: intelligence_engine
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=intelligence
      - DB_USER=ghost
      - DB_PASS=protocol
    volumes:
      - ./intelligence/data:/app/intelligence/data
      - ./olho_de_deus:/app/olho_de_deus
    # Por padrão, apenas mantém o container vivo ou executa o main se necessário
    command: [ "tail", "-f", "/dev/null" ]
    restart: unless-stopped

volumes:
  pgdata:
