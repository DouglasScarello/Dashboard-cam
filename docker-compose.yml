version: '3.8'

services:
  # Cache Distribuído — Fase 31.1: Redis Cache Layer
  redis:
    image: redis:7-alpine
    container_name: ghost_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Banco de Dados Profissional para Inteligência com Suporte Vetorial
  db:
    image: ankane/pgvector:v0.5.1
    container_name: intelligence_db_pg
    environment:
      POSTGRES_DB: intelligence
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: protocol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Motor de Inteligência e Ingestão (Olho de Deus)
  intelligence:
    build: .
    container_name: intelligence_engine
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=intelligence
      - DB_USER=ghost
      - DB_PASS=protocol
    volumes:
      - ./intelligence/data:/app/intelligence/data
      - ./olho_de_deus:/app/olho_de_deus
    # Por padrão, apenas mantém o container vivo ou executa o main se necessário
    command: [ "tail", "-f", "/dev/null" ]
    restart: unless-stopped

  # Servidor de Streaming Zero Latency (Fase 31.3)
  go2rtc:
    image: alexxit/go2rtc
    container_name: go2rtc_streamer
    network_mode: host # Recomendado para WebRTC/UDP simplificado em ambiente local
    privileged: true
    volumes:
      - ./config/go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
