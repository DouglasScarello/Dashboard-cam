<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Catalog — Olho de Deus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">
      <span class="logo-icon">👁</span>
      <span class="logo-text">INTELLIGENCE <span class="accent">CATALOG</span></span>
    </div>
    <div class="header-stats">
      <div class="stat"><span class="dot red"></span> <span id="statWanted">0</span> Procurados</div>
      <div class="stat"><span class="dot amber"></span> <span id="statMissing">0</span> Desaparecidos</div>
      <div class="stat"><span class="dot cyan"></span> <span id="statBio">0</span> Biometria</div>
    </div>
  </div>
  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nome, crime..." autocomplete="off">
      <kbd class="search-kbd">⌘K</kbd>
    </div>
  </div>
</header>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filters-inner">
    <div class="filter-main">
      <div class="cat-group">
        <button class="cat-btn active" data-category="">Todos</button>
        <button class="cat-btn" data-category="wanted"><span class="dot red"></span> Procurados</button>
        <button class="cat-btn" data-category="missing"><span class="dot amber"></span> Desaparecidos</button>
      </div>
      
      <div class="select-group">
        <div class="select-wrapper">
          <select id="sourceFilter" class="filter-select">
            <option value="">Todas as fontes</option>
            <option value="FBI">FBI</option>
            <option value="Interpol">Interpol</option>
          </select>
        </div>
        <div class="select-wrapper">
          <select id="countryFilter" class="filter-select">
            <option value="">Todos os países</option>
            <option value="us">Estados Unidos</option>
            <option value="br">Brasil</option>
          </select>
        </div>
      </div>

      <label class="bio-toggle">
        <input type="checkbox" id="bioOnly">
        <span class="bio-toggle-custom">
          <span class="bio-icon">🧬</span>
          Só com biometria
        </span>
      </label>
    </div>

    <div class="filter-right">
      <span id="resultCount" class="result-count">0 resultados</span>
      <button class="icon-btn-text" id="exportBtn">↓ CSV</button>
    </div>
  </div>
</div>

<!-- GRID -->
<main class="main">
  <div class="grid" id="grid"></div>
  <div class="load-more-wrap">
    <button class="load-more-btn" id="loadMoreBtn">Carregar mais</button>
  </div>
  <div class="empty-state" id="emptyState" style="display:none">
    <span class="empty-icon">🔍</span>
    <p>Nenhum resultado encontrado.</p>
  </div>
</main>

<!-- MODAL DE DETALHE -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="main.js"></script>
</body>
</html>
