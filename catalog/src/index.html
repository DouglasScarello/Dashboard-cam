<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Catalog — Olho de Deus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">
      <span class="logo-text">OLHO DE DEUS <span class="logo-sub">INTELLIGENCE</span></span>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar indivíduos..." autocomplete="off">
  </div>
  <div class="header-right">
    <div class="stats-bar" id="statsBar">
      <div class="stat"><span class="dot red"></span> <span id="statWanted">0</span> WANTED</div>
      <div class="stat"><span class="dot amber"></span> <span id="statMissing">0</span> MISSING</div>
    </div>
  </div>
</header>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filters-inner">
    <div class="filter-group">
      <div class="select-wrapper">
        <select id="sourceFilter" class="filter-select">
          <option value="">Todas as fontes</option>
          <option value="FBI">FBI</option>
          <option value="Interpol">Interpol</option>
          <option value="Europol">Europol</option>
        </select>
      </div>
      <div class="select-wrapper">
        <select id="countryFilter" class="filter-select">
          <option value="">Todos os países</option>
          <option value="us">Estados Unidos</option>
          <option value="br">Brasil</option>
          <option value="ru">Rússia</option>
        </select>
      </div>
      
      <label class="bio-toggle">
        <input type="checkbox" id="bioOnly">
        <span class="bio-toggle-custom">
          <span class="bio-icon">🧬</span>
          Só com biometria
        </span>
      </label>
    </div>

    <div class="filter-right">
      <span id="resultCount" class="result-count">0 registros</span>
      <div class="view-ops">
        <button class="icon-btn active" title="Grid View">⊞</button>
        <button class="icon-btn" title="List View">≡</button>
      </div>
    </div>
  </div>
</div>

<!-- GRID -->
<main class="main">
  <div class="grid" id="grid"></div>
  <div class="load-more-wrap">
    <button class="load-more-btn" id="loadMoreBtn">Carregar mais</button>
  </div>
  <div class="empty-state" id="emptyState" style="display:none">
    <span class="empty-icon">🔍</span>
    <p>Nenhum resultado encontrado.</p>
  </div>
</main>

<!-- MODAL DE DETALHE -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="main.js"></script>
</body>
</html>
